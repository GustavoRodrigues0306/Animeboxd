<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil | Animeboxd</title>
    <link rel="icon" type="image/png" href="img/abox.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">
            <h1><a href="index.html">Anime<span>boxd</span></a></h1>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="perfil.html" class="active">Meu Perfil</a></li>
                <li><a href="#" id="btn-login">Login / Cadastro</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        
        <section class="perfil-header">
            <div class="perfil-avatar">
                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=AnimeFan" alt="Avatar do Usuário">
            </div>
            <div class="perfil-info">
                <h2 id="perfil-nome">Random99</h2>
                <p id="perfil-bio">Maratonador profissional de animes e crítico nas horas vagas. Só assisto Shounen e Seinen de respeito.</p>
                <div class="perfil-stats">
                    <span><strong id="total-assistidos">0</strong> Assistidos</span>
                    <span><strong id="total-favoritos">0</strong> Favoritos</span>
                </div>
            </div>
        </section>

        <section class="perfil-abas">
            <button class="aba-btn active" onclick="mudarAba('favoritos')">Meus Favoritos</button>
            <button class="aba-btn" onclick="mudarAba('assistidos')">Animes Assistidos</button>
            <button class="aba-btn" onclick="mudarAba('avaliacoes')">Minhas Críticas</button>
        </section>

        <section class="perfil-conteudo">
            
            <div id="aba-favoritos" class="conteudo-secao">
                <div class="animes-grid" id="favoritos-grid"></div>
            </div>

            <div id="aba-assistidos" class="conteudo-secao" style="display: none;">
                <div class="animes-grid" id="assistidos-grid"></div>
            </div>

            <div id="aba-avaliacoes" class="conteudo-secao" style="display: none;">
                <div class="reviews-lista" id="reviews-grid"></div>
            </div>

        </section>

    </main>

    <footer>
        <p>&copy; 2026 Animeboxd. Feito para o portfólio do GitHub.</p>
    </footer>

    <script src="js/auth.js"></script>
    <script src="js/perfil.js"></script>
    
</body>
</html>
